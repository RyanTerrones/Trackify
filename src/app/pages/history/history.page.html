<ion-header>
  <ion-toolbar color="primary">
    <ion-title>Search History</ion-title>
    <ion-buttons slot="end">
      <ion-button (click)="clearHistory()" *ngIf="searchHistory.length > 0">
        Clear All
      </ion-button>
    </ion-buttons>
  </ion-toolbar>
</ion-header>

<ion-content>
  <div *ngIf="searchHistory.length === 0" class="empty-state">
    <ion-icon name="time-outline"></ion-icon>
    <h2>No Search History</h2>
    <p>Your recent searches will appear here</p>
  </div>

  <ion-list *ngIf="searchHistory.length > 0">
    <ion-item
      *ngFor="let query of searchHistory"
      (click)="searchAgain(query)"
      button>
      <ion-icon slot="start" name="search-outline" style="color: #3f6675"></ion-icon>
      <ion-label>
        <h2>{{ query }}</h2>
      </ion-label>
      <ion-icon slot="end" name="time-outline" style="color: #888"></ion-icon>
    </ion-item>
  </ion-list>
</ion-content>
