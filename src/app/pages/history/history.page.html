<ion-header>
  <ion-toolbar color="primary">
    <ion-title style="text-align:center; width:100%">Trackify</ion-title>
  </ion-toolbar>
  <ion-toolbar style="--background:#2b2b2b">
    <ion-title class="page-title">History</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content>
  <div *ngIf="searchHistory.length === 0" class="empty-state">
    <ion-icon name="time-outline"></ion-icon>
    <h2>No Search History</h2>
    <p>Your recent searches will appear here</p>
  </div>

  <div *ngIf="searchHistory.length > 0">
    <ion-list>
      <ion-item *ngFor="let query of searchHistory" (click)="searchAgain(query)" button>
        <ion-icon slot="start" name="search-outline" style="color: #3f6675"></ion-icon>
        <ion-label>
          <h2>{{ query }}</h2>
        </ion-label>
        <ion-icon slot="end" name="time-outline" style="color: #888"></ion-icon>
      </ion-item>
    </ion-list>

    <div class="clear-all-container">
      <ion-button fill="outline" (click)="clearHistory()" style="--border-color:white; --color:white">
        Clear All
      </ion-button>
    </div>
  </div>
</ion-content>
