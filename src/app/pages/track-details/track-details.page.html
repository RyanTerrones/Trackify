<ion-header>
  <ion-toolbar color="primary">
    <ion-buttons slot="start">
      <ion-back-button defaultHref="/home"></ion-back-button>
    </ion-buttons>
    <ion-title>{{ track }}</ion-title>
    <ion-buttons slot="end">
      <ion-button (click)="toggleFavourite()">
        <ion-icon [name]="isFavourite ? 'heart' : 'heart-outline'"></ion-icon>
      </ion-button>
      <ion-button (click)="shareTrack()">
        <ion-icon name="share-outline"></ion-icon>
      </ion-button>
    </ion-buttons>
  </ion-toolbar>
</ion-header>

<ion-content>
  <ion-spinner *ngIf="isLoading"></ion-spinner>

  <div *ngIf="!isLoading">
    <ion-card *ngIf="deezerTrack">
      <img [src]="deezerTrack.album.cover_big" alt="Album Art"/>
      <ion-card-header>
        <ion-card-title>{{ trackInfo?.name }}</ion-card-title>
        <ion-card-subtitle (click)="goToArtist()" style="cursor:pointer; color:#3f6675">
          {{ trackInfo?.artist?.name }}
        </ion-card-subtitle>
      </ion-card-header>
      <ion-card-content>

        <div class="audio-player" *ngIf="deezerTrack?.preview">
          <p>30 Second Preview</p>
          <audio controls [src]="deezerTrack.preview" style="width:100%"></audio>
        </div>

        <div class="rating-section">
          <p>Your Rating</p>
          <div class="stars">
            <ion-icon
              *ngFor="let star of [1,2,3,4,5]"
              [name]="star <= userRating ? 'star' : 'star-outline'"
              (click)="setRating(star)"
              style="font-size:32px; cursor:pointer; color:#3f6675">
            </ion-icon>
          </div>
        </div>

        <div class="track-info" *ngIf="trackInfo?.wiki">
          <h3>About this Track</h3>
          <p>{{ trackInfo.wiki.summary }}</p>
        </div>

        <div class="track-stats">
          <ion-item>
            <ion-label>
              <h3>Listeners</h3>
              <p>{{ trackInfo?.listeners | number }}</p>
            </ion-label>
          </ion-item>
          <ion-item>
            <ion-label>
              <h3>Playcount</h3>
              <p>{{ trackInfo?.playcount | number }}</p>
            </ion-label>
          </ion-item>
          <ion-item>
            <ion-label>
              <h3>Duration</h3>
              <p>{{ trackInfo?.duration }} seconds</p>
            </ion-label>
          </ion-item>
        </div>

      </ion-card-content>
    </ion-card>
  </div>
</ion-content>
